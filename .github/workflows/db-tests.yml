name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  app:
    name: Lint + offline-layer gate tests + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      # Phase 2 gate: airplane-mode exactly-once, double-fire no-dupes,
      # stale-edit-to-error-tray (src/lib/offline/__tests__)
      - run: npm test
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder

  pgtap:
    name: Migrations + RLS test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # Starts local Postgres, applies supabase/migrations, runs supabase/seed.sql
      - name: Start database
        run: supabase db start

      # pgTAP suites in supabase/tests — the Phase 1 gate:
      # cross-tenant leakage, visibility matrix, constraints, stage trigger
      - name: Run pgTAP suites
        run: supabase test db
